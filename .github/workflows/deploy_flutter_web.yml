name: Deploy Flutter Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        working-directory: cricket_manager_app
        run: flutter pub get

      - name: Build web
        working-directory: cricket_manager_app
        run: flutter build web --release --base-href /ayzcric/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cricket_manager_app/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
